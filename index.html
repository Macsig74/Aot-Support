<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bloc-notes · Raspberry Pi</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500&display=swap');

        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg: #0f0f0f;
            --surface: #1a1a1a;
            --surface2: #242424;
            --border: #2e2e2e;
            --accent: #c8f060;
            --accent-dim: #8fb83a;
            --text: #e8e8e2;
            --muted: #5a5a52;
            --danger: #ff5f5f;
            --mono: 'IBM Plex Mono', monospace;
            --sans: 'IBM Plex Sans', sans-serif;
        }

        body {
            font-family: var(--sans);
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: grid;
            grid-template-columns: 1fr 320px;
            grid-template-rows: auto 1fr;
            gap: 0;
        }

        /* HEADER */
        header {
            grid-column: 1 / -1;
            padding: 1.2rem 2rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 1rem;
            background: var(--surface);
        }

        .logo {
            width: 28px;
            height: 28px;
            background: var(--accent);
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .logo svg {
            width: 16px;
            height: 16px;
        }

        header h1 {
            font-family: var(--mono);
            font-size: 15px;
            font-weight: 500;
            letter-spacing: 0.02em;
            color: var(--text);
        }

        .pill {
            margin-left: auto;
            font-family: var(--mono);
            font-size: 11px;
            padding: 3px 10px;
            border-radius: 20px;
            background: #1e2e0d;
            color: var(--accent);
            border: 1px solid #3a520a;
        }

        /* MAIN EDITOR */
        main {
            padding: 2rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            border-right: 1px solid var(--border);
            min-height: 0;
        }

        .field-row {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .field-row label {
            font-family: var(--mono);
            font-size: 11px;
            color: var(--muted);
            white-space: nowrap;
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }

        input[type="text"] {
            flex: 1;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 8px 12px;
            color: var(--text);
            font-family: var(--mono);
            font-size: 13px;
            outline: none;
            transition: border-color 0.15s;
        }

        input[type="text"]:focus {
            border-color: var(--accent-dim);
        }

        input[type="text"]::placeholder {
            color: var(--muted);
        }

        textarea {
            flex: 1;
            resize: none;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 1rem 1.2rem;
            color: var(--text);
            font-family: var(--mono);
            font-size: 14px;
            line-height: 1.7;
            outline: none;
            min-height: 340px;
            transition: border-color 0.15s;
        }

        textarea:focus {
            border-color: var(--accent-dim);
        }

        textarea::placeholder {
            color: var(--muted);
        }

        .actions {
            display: flex;
            gap: 0.75rem;
            align-items: center;
        }

        .btn-save {
            font-family: var(--mono);
            font-size: 13px;
            font-weight: 500;
            padding: 10px 24px;
            background: var(--accent);
            color: #0f0f0f;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            letter-spacing: 0.02em;
            transition: background 0.15s, transform 0.1s;
        }

        .btn-save:hover {
            background: #d9ff70;
        }

        .btn-save:active {
            transform: scale(0.98);
        }

        .btn-save:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .btn-clear {
            font-family: var(--mono);
            font-size: 13px;
            padding: 10px 16px;
            background: transparent;
            color: var(--muted);
            border: 1px solid var(--border);
            border-radius: 6px;
            cursor: pointer;
            transition: color 0.15s, border-color 0.15s;
        }

        .btn-clear:hover {
            color: var(--text);
            border-color: var(--muted);
        }

        .char-count {
            margin-left: auto;
            font-family: var(--mono);
            font-size: 11px;
            color: var(--muted);
        }

        .toast {
            font-family: var(--mono);
            font-size: 12px;
            padding: 8px 14px;
            border-radius: 6px;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
        }

        .toast.ok {
            background: #1e2e0d;
            color: var(--accent);
            border: 1px solid #3a520a;
        }

        .toast.err {
            background: #2e0d0d;
            color: var(--danger);
            border: 1px solid #520a0a;
        }

        .toast.show {
            opacity: 1;
        }

        /* SIDEBAR */
        aside {
            padding: 1.5rem 1.25rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            overflow: hidden;
        }

        aside h2 {
            font-family: var(--mono);
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--muted);
        }

        #file-list {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        #file-list::-webkit-scrollbar {
            width: 4px;
        }

        #file-list::-webkit-scrollbar-track {
            background: transparent;
        }

        #file-list::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 4px;
        }

        .file-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 10px;
            border-radius: 6px;
            cursor: default;
            transition: background 0.1s;
        }

        .file-item:hover {
            background: var(--surface2);
        }

        .file-icon {
            width: 20px;
            height: 20px;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .file-icon svg {
            width: 11px;
            height: 11px;
            stroke: var(--muted);
        }

        .file-name {
            font-family: var(--mono);
            font-size: 12px;
            color: var(--text);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .empty-msg {
            font-family: var(--mono);
            font-size: 12px;
            color: var(--muted);
            text-align: center;
            padding: 2rem 0;
        }

        .refresh-btn {
            font-family: var(--mono);
            font-size: 11px;
            padding: 6px 12px;
            background: transparent;
            color: var(--muted);
            border: 1px solid var(--border);
            border-radius: 6px;
            cursor: pointer;
            align-self: flex-start;
            transition: color 0.15s;
        }

        .refresh-btn:hover {
            color: var(--text);
        }

        @media (max-width: 700px) {
            body {
                grid-template-columns: 1fr;
                grid-template-rows: auto 1fr auto;
            }

            aside {
                border-top: 1px solid var(--border);
                max-height: 220px;
            }
        }
    </style>
</head>

<body>

    <header>
        <div class="logo">
            <svg viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
                <rect x="2" y="2" width="12" height="12" rx="2" fill="#0f0f0f" />
                <path d="M4 6h8M4 8.5h5M4 11h6" stroke="#c8f060" stroke-width="1.3" stroke-linecap="round" />
            </svg>
        </div>
        <h1>bloc-notes / raspberry pi</h1>
        <span class="pill" id="status-pill">● connecté</span>
    </header>

    <main>
        <div class="field-row">
            <label>nom du fichier</label>
            <input type="text" id="nom" placeholder="ex: note-reunion  (laisse vide = date/heure auto)">
        </div>

        <textarea id="texte" placeholder="Écris ton texte ici…" spellcheck="true"></textarea>

        <div class="actions">
            <button class="btn-save" id="btn-save" onclick="sauvegarder()">↓ Sauvegarder</button>
            <button class="btn-clear" onclick="effacer()">Effacer</button>
            <span class="char-count" id="char-count">0 car.</span>
            <span class="toast" id="toast"></span>
        </div>
    </main>

    <aside>
        <h2>Fichiers sauvegardés</h2>
        <button class="refresh-btn" onclick="chargerListe()">↻ Actualiser</button>
        <div id="file-list">
            <p class="empty-msg">Chargement…</p>
        </div>
    </aside>

    <script>
        const txtArea = document.getElementById('texte');
        const charCount = document.getElementById('char-count');
        const toast = document.getElementById('toast');
        const statusPill = document.getElementById('status-pill');

        txtArea.addEventListener('input', () => {
            const n = txtArea.value.length;
            charCount.textContent = n.toLocaleString('fr') + ' car.';
        });

        function afficherToast(msg, type) {
            toast.textContent = msg;
            toast.className = 'toast ' + type + ' show';
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        async function sauvegarder() {
            const texte = txtArea.value.trim();
            const nom = document.getElementById('nom').value.trim();
            if (!texte) { afficherToast('Texte vide !', 'err'); return; }

            const btn = document.getElementById('btn-save');
            btn.disabled = true;
            btn.textContent = '…';

            try {
                const r = await fetch('/save', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ texte, nom })
                });
                const data = await r.json();
                if (data.ok) {
                    afficherToast('✓ Sauvegardé → ' + data.fichier.split('/').pop(), 'ok');
                    chargerListe();
                } else {
                    afficherToast('Erreur : ' + data.msg, 'err');
                }
            } catch (e) {
                afficherToast('Serveur inaccessible', 'err');
                statusPill.textContent = '● hors ligne';
                statusPill.style.background = '#2e0d0d';
                statusPill.style.color = '#ff5f5f';
            } finally {
                btn.disabled = false;
                btn.textContent = '↓ Sauvegarder';
            }
        }

        function effacer() {
            txtArea.value = '';
            document.getElementById('nom').value = '';
            charCount.textContent = '0 car.';
        }

        async function chargerListe() {
            const list = document.getElementById('file-list');
            try {
                const r = await fetch('/liste');
                const fichiers = await r.json();
                if (!fichiers.length) {
                    list.innerHTML = '<p class="empty-msg">Aucun fichier</p>';
                    return;
                }
                list.innerHTML = fichiers.map(f => `
      <div class="file-item">
        <div class="file-icon">
          <svg viewBox="0 0 12 12" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M2 1.5h5l3 3V10.5H2z" stroke-width="1" stroke-linejoin="round"/>
            <path d="M7 1.5V4.5h3" stroke-width="1" stroke-linejoin="round"/>
          </svg>
        </div>
        <span class="file-name" title="${f}">${f}</span>
      </div>
    `).join('');
                statusPill.textContent = '● connecté';
                statusPill.style.background = '';
                statusPill.style.color = '';
            } catch (e) {
                list.innerHTML = '<p class="empty-msg">Serveur inaccessible</p>';
            }
        }

        document.addEventListener('keydown', e => {
            if ((e.ctrlKey || e.metaKey) && e.key === 's') {
                e.preventDefault();
                sauvegarder();
            }
        });

        chargerListe();
    </script>
</body>

</html>
